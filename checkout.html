<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout - EliteCart</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        body { background-color: #f8f9fa; }
        .checkout-form { background: #fff; padding: 30px; border-radius: 15px; }
        .summary-item { border-bottom: 1px solid #eee; padding: 10px 0; }
        .payment-option { border: 1px solid #ddd; padding: 15px; border-radius: 10px; cursor: pointer; transition: 0.3s; }
        .payment-option:hover { border-color: #ffc107; background: #fffdf5; }
        .cart-container { background: #fff; padding: 25px; border-radius: 15px; }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top">
        <div class="container">
            <a class="navbar-brand font-weight-bold" href="home.html">EliteCart</a>
            <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ml-auto">
                    <li class="nav-item"><a class="nav-link" href="home.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="products.html">Products</a></li>
                    <li class="nav-item"><a class="nav-link" href="about.html">About Us</a></li>
                    <li class="nav-item"><a class="nav-link" href="contact.html">Contact Us</a></li>
                    <li class="nav-item"><a class="nav-link" href="cart.html"><i class="fas fa-shopping-cart"></i> Cart</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container my-5">
        <div class="row">
            <div class="col-lg-8 mb-4">
                <div class="checkout-form shadow-sm">
                    <h4 class="font-weight-bold mb-4">Shipping Information</h4>
                    <form id="checkoutForm">
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label>First Name</label>
                                <input type="text" class="form-control" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label>Last Name</label>
                                <input type="text" class="form-control" required>
                            </div>
                        </div>
                        <div class="mb-3">
                            <label>Full Address</label>
                            <textarea class="form-control" rows="3" required></textarea>
                        </div>
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label>City</label>
                                <input type="text" class="form-control" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label>Pincode</label>
                                <input type="number" class="form-control" required>
                            </div>
                        </div>

                        <h4 class="font-weight-bold mt-4 mb-3">Payment Method</h4>
                        <div class="payment-option mb-3">
                            <div class="custom-control custom-radio">
                                <input type="radio" id="cod" name="payment" class="custom-control-input" checked>
                                <label class="custom-control-label font-weight-bold" for="cod">Cash on Delivery (COD)</label>
                            </div>
                        </div>
                        <div class="payment-option mb-4">
                            <div class="custom-control custom-radio">
                                <input type="radio" id="card" name="payment" class="custom-control-input">
                                <label class="custom-control-label font-weight-bold" for="card">Credit / Debit Card</label>
                            </div>
                        </div>

                        <button type="submit" class="btn btn-warning btn-block btn-lg font-weight-bold py-3">PLACE ORDER</button>
                    </form>
                </div>
            </div>

            <div class="col-lg-4">
                <div class="cart-container shadow-sm">
                    <h5 class="font-weight-bold mb-4">Order Summary</h5>
                    <div id="checkoutSummary"></div>
                    <hr>
                    <div class="d-flex justify-content-between">
                        <span class="text-muted">Subtotal</span>
                        <span id="sumSubtotal">₹0</span>
                    </div>
                    <div class="d-flex justify-content-between">
                        <span class="text-muted">Shipping</span>
                        <span class="text-success">FREE</span>
                    </div>
                    <hr>
                    <div class="d-flex justify-content-between">
                        <h5 class="font-weight-bold">Total</h5>
                        <h5 class="font-weight-bold text-success" id="sumTotal">₹0</h5>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <footer class="text-center py-5 bg-dark text-white">
        <div class="container">
            <h3 class="font-weight-bold text-warning mb-4">EliteCart</h3>
            <div class="mb-4">
                <a href="#" class="text-white mx-3"><i class="fab fa-facebook-f fa-lg"></i></a>
                <a href="#" class="text-white mx-3"><i class="fab fa-instagram fa-lg"></i></a>
                <a href="#" class="text-white mx-3"><i class="fab fa-twitter fa-lg"></i></a>
            </div>
            <p class="text-muted small">© 2026 EliteCart | Secure Checkout Powered by EliteCart</p>
        </div>
    </footer>

    <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.5.2/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        function loadSummary() {
            const cart = JSON.parse(localStorage.getItem('EliteCartData')) || [];
            const summaryDiv = document.getElementById('checkoutSummary');
            let total = 0;

            if(cart.length === 0) {
                window.location.href = "products.html";
                return;
            }

            summaryDiv.innerHTML = cart.map(item => {
                const price = typeof item.price === 'number' ? item.price : parseInt(item.price.replace(/[^\d]/g, ''));
                total += (price * item.qty);
                
                return `
                    <div class="summary-item d-flex justify-content-between align-items-center">
                        <div>
                            <small class="font-weight-bold d-block">${item.name}</small>
                            <small class="text-muted">Qty: ${item.qty}</small>
                        </div>
                        <small class="font-weight-bold">₹${(price * item.qty).toLocaleString('en-IN')}</small>
                    </div>
                `;
            }).join('');

            const formatted = "₹" + total.toLocaleString('en-IN');
            document.getElementById('sumSubtotal').innerText = formatted;
            document.getElementById('sumTotal').innerText = formatted;
        }

        document.getElementById('checkoutForm').onsubmit = function(e) {
            e.preventDefault();
            alert('Success! Your order has been placed. Thank you for shopping with EliteCart.');
            localStorage.removeItem('EliteCartData');
            window.location.href = "home.html";
        };

        window.onload = loadSummary;
    </script>
</body>
</html>
