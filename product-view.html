<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Details - EliteCart</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        .product-container { background: #fff; border-radius: 20px; padding: 50px; margin-top: 50px; box-shadow: 0 15px 35px rgba(0,0,0,0.05); }
        .img-display { background: #fff; border-radius: 15px; padding: 20px; text-align: center; border: 1px solid #f0f0f0; height: 100%; display: flex; align-items: center; justify-content: center; }
        .img-display img { max-height: 450px; width: auto; max-width: 100%; object-fit: contain; }
        .price-text-large { font-size: 2.5rem; font-weight: 800; color: #28a745; margin: 20px 0; }
        .qty-selector { width: 120px; height: 45px; border-radius: 8px; font-weight: bold; }
        .badge-category { text-transform: uppercase; letter-spacing: 1px; font-size: 0.8rem; background: #f8f9fa; padding: 5px 15px; border-radius: 50px; color: #6c757d; border: 1px solid #dee2e6; }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top">
    <div class="container">
        <a class="navbar-brand font-weight-bold" href="index.html">EliteCart</a>
        <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ml-auto">
                <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                <li class="nav-item"><a class="nav-link" href="products.html">Products</a></li>
                <li class="nav-item active"><a class="nav-link" href="about.html">About Us</a></li>
                <li class="nav-item"><a class="nav-link" href="contact.html">Contact Us</a></li>
                <li class="nav-item"><a class="nav-link" href="cart.html"><i class="fas fa-shopping-cart"></i> Cart</a></li>
            </ul>

            <form action="search.html" method="GET" class="form-inline ml-lg-3">
                <input class="form-control mr-sm-2" type="search" name="q" placeholder="Search products..." required>
                <button class="btn btn-outline-warning my-2 my-sm-0" type="submit">
                    <i class="fas fa-search"></i>
                </button>
            </form>
        </div>
    </div>
</nav>

    <div class="container mb-5">
        <div class="product-container">
            <div class="row">
                <div class="col-md-6 mb-4">
                    <div class="img-display shadow-sm">
                        <img id="mainImage" src="" alt="Product Image">
                    </div>
                </div>
                
                <div class="col-md-6">
                    <span id="categoryLabel" class="badge-category">Category</span>
                    <h1 id="productName" class="font-weight-bold mt-3">Loading Product...</h1>
                    
                    <div class="text-warning mb-3">
                        <i class="fas fa-star"></i><i class="fas fa-star"></i><i class="fas fa-star"></i><i class="fas fa-star"></i><i class="fas fa-star-half-alt"></i>
                        <span class="text-muted ml-2 small">(4.5/5 Customer Rating)</span>
                    </div>
                    
                    <h2 id="productPrice" class="price-text-large">₹0</h2>
                    
                    <p id="productDescription" class="text-muted mb-4 lead" style="font-size: 1rem;">
                        </p>

                    <div class="form-group mb-4">
                        <label class="font-weight-bold">Quantity:</label>
                        <select id="quantity" class="form-control qty-selector">
                            <option value="1">1</option><option value="2">2</option>
                            <option value="3">3</option><option value="4">4</option>
                            <option value="5">5</option>
                        </select>
                    </div>

                    <div class="row">
                        <div class="col-sm-6 mb-2">
                            <button class="btn btn-warning btn-block btn-lg font-weight-bold py-3 shadow-sm" onclick="addToCart()">
                                <i class="fas fa-cart-plus mr-2"></i>ADD TO CART
                            </button>
                        </div>
                        <div class="col-sm-6 mb-2">
                            <button class="btn btn-dark btn-block btn-lg font-weight-bold py-3 shadow-sm" onclick="buyNow()">
                                BUY NOW
                            </button>
                        </div>
                    </div>
                    <p class="text-muted small mt-3"><i class="fas fa-truck mr-2"></i> Eligible for Free Express Delivery</p>
                </div>
            </div>
        </div>
    </div>

    <footer class="text-center py-5 bg-dark text-white">
        <div class="container">
            <h3 class="font-weight-bold text-warning mb-3">EliteCart</h3>
            <p class="text-muted small">© 2026 EliteCart | Curating Excellence for the Modern Lifestyle</p>
        </div>
    </footer>

    <script>
    const products = {
        // ELECTRONICS
        'watch': { 
            name: 'Smart Watch v2', price: '₹9,999', cat: 'Electronics', 
            img: 'https://images.unsplash.com/photo-1508685096489-7aacd43bd3b1?w=600',
            desc: 'Stay connected with the EliteCart Smart Watch v2. Featuring a titanium finish, heart-rate monitoring, and a 14-day battery life.'
        },
        'audio': { 
            name: 'Wireless Headphones', price: '₹4,500', cat: 'Electronics', 
            img: 'https://images.unsplash.com/photo-1505740420928-5e560c06d30e?w=600',
            desc: 'Experience studio-quality sound with active noise cancellation and ultra-soft memory foam earcups.'
        },
        'cam': { 
            name: 'Digital Camera 4K', price: '₹42,000', cat: 'Electronics', 
            img: 'https://images.unsplash.com/photo-1526170375885-4d8ecf77b99f?w=600',
            desc: 'Capture professional-grade 4K visuals with high-speed autofocus and a versatile 24-70mm lens.'
        },
        'elec4': { 
            name: 'Pro Gaming Laptop', price: '₹85,000', cat: 'Electronics', 
            img: 'https://images.unsplash.com/photo-1603302576837-37561b2e2302?w=600',
            desc: 'Unleash elite performance with an RTX-series GPU and a high-refresh display for seamless gaming.'
        },
        'elec5': { 
            name: 'Bluetooth Speaker', price: '₹2,999', cat: 'Electronics', 
            img: 'https://www.portronics.com/cdn/shop/files/Portronics_Resound_2_best_portable_speakers_in_India_under_3000.jpg?v=1736943324',
            desc: 'The Portronics Resound 2 delivers immersive 360-degree immersive audio with deep bass and a rugged waterproof body.'
        },

        // FASHION
        'fashion1': { 
            name: 'Premium Cotton Tee', price: '₹1,200', cat: 'Fashion', 
            img: 'https://images.unsplash.com/photo-1525507119028-ed4c629a60a3?w=600',
            desc: 'Crafted from 100% organic cotton, this tee offers a tailored fit and breathable comfort for everyday style.'
        },
        'fashion2': { 
            name: 'Urban Sneakers', price: '₹4,999', cat: 'Fashion', 
            img: 'https://images.unsplash.com/photo-1542291026-7eec264c27ff?w=600',
            desc: 'Sleek street-ready design meets responsive cushioning for maximum comfort and modern urban street style.'
        },
        'fash3': { 
            name: 'Denim Jacket', price: '₹3,200', cat: 'Fashion', 
            img: 'https://images.unsplash.com/photo-1543076447-215ad9ba6923?w=400',
            desc: 'A classic silhouette with a modern wash. This durable denim jacket is a versatile layer for any season.'
        },

        // HOME DECOR
        'decor1': { 
            name: 'Lounge Chair', price: '₹15,500', cat: 'Home Decor', 
            img: 'https://images.unsplash.com/photo-1567538096630-e0c55bd6374c?w=600',
            desc: 'Ergonomically designed for luxury and relaxation. Features premium upholstery and a minimalist aesthetic.'
        },
        'decor2': { 
            name: 'Ceramic Vase', price: '₹1,500', cat: 'Home Decor', 
            img: 'https://www.coteacoast.com/cdn/shop/files/FullSizeRender4721_1024x1024.jpg?v=1685121289',
            desc: 'A hand-finished minimalist masterpiece that adds sophisticated organic texture to any modern space.'
        },
        'decor3': { 
            name: 'Table Lamp', price: '₹2,100', cat: 'Home Decor', 
            img: 'https://images.unsplash.com/photo-1507473885765-e6ed057f782c?w=400',
            desc: 'Provides warm, ambient lighting with a contemporary metallic base and a textured fabric shade.'
        }
    };

    const params = new URLSearchParams(window.location.search);
    const productId = params.get('id');
    const product = products[productId];

    if (product) {
        document.getElementById('productName').innerText = product.name;
        document.getElementById('productPrice').innerText = product.price;
        document.getElementById('categoryLabel').innerText = product.cat;
        document.getElementById('mainImage').src = product.img;
        document.getElementById('productDescription').innerText = product.desc;
        document.title = product.name + " | EliteCart";
    } else {
        window.location.href = "products.html";
    }

    function addToCart() {
        const qty = parseInt(document.getElementById('quantity').value);
        
        // This converts "₹9,999" into the number 9999 so the cart can calculate totals
        const numericPrice = parseInt(product.price.replace(/[₹,]/g, ''));

        const cartItem = {
            id: productId,
            name: product.name,
            price: numericPrice,
            img: product.img,
            qty: qty
        };

        // Standardized storage key
        let cart = JSON.parse(localStorage.getItem('EliteCartData')) || [];
        const existingIndex = cart.findIndex(item => item.id === productId);
        
        if (existingIndex > -1) {
            cart[existingIndex].qty += qty;
        } else {
            cart.push(cartItem);
        }

        localStorage.setItem('EliteCartData', JSON.stringify(cart));
        alert(qty + " x " + product.name + " added to cart!");
    }

    function buyNow() {
        addToCart();
        // Short delay to ensure localStorage is saved before the page changes
        setTimeout(() => {
            window.location.href = "cart.html";
        }, 100);
    }
</script>

    <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.5.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
