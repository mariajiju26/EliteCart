<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping Cart - EliteCart</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        body { background-color: #f8f9fa; }
        .cart-container { background: #fff; border-radius: 15px; padding: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        .cart-item-img { width: 100px; height: 100px; object-fit: cover; border-radius: 10px; }
        .summary-card { border: none; border-radius: 15px; background: #fff; position: sticky; top: 90px; }
        .empty-cart-icon { font-size: 4rem; color: #dee2e6; margin-bottom: 20px; }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top">
    <div class="container">
        <a class="navbar-brand font-weight-bold" href="home.html">EliteCart</a>
        <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ml-auto">
                <li class="nav-item"><a class="nav-link" href="home.html">Home</a></li>
                <li class="nav-item"><a class="nav-link" href="products.html">Products</a></li>
                <li class="nav-item active"><a class="nav-link" href="about.html">About Us</a></li>
                <li class="nav-item"><a class="nav-link" href="contact.html">Contact Us</a></li>
                <li class="nav-item"><a class="nav-link" href="cart.html"><i class="fas fa-shopping-cart"></i> Cart</a></li>
            </ul>

            <form action="search.html" method="GET" class="form-inline ml-lg-3">
                <input class="form-control mr-sm-2" type="search" name="q" placeholder="Search products..." required>
                <button class="btn btn-outline-warning my-2 my-sm-0" type="submit">
                    <i class="fas fa-search"></i>
                </button>
            </form>
        </div>
    </div>
</nav>

    <div class="container my-5">
        <div class="row">
            <div class="col-lg-8 mb-4">
                <div class="cart-container">
                    <h3 class="font-weight-bold mb-4">Your Shopping Cart</h3>
                    <div id="cartContent">
                        </div>
                </div>
            </div>

            <div class="col-lg-4">
                <div class="card summary-card shadow-sm">
                    <div class="card-body p-4">
                        <h5 class="font-weight-bold mb-4">Order Summary</h5>
                        <div class="d-flex justify-content-between mb-2">
                            <span>Subtotal</span>
                            <span id="subtotalPrice">₹0</span>
                        </div>
                        <div class="d-flex justify-content-between mb-2">
                            <span>Shipping</span>
                            <span class="text-success font-weight-bold">FREE</span>
                        </div>
                        <div class="d-flex justify-content-between mb-4">
                            <span>Tax (GST)</span>
                            <span>Included</span>
                        </div>
                        <hr>
                        <div class="d-flex justify-content-between mb-4">
                            <span class="h5 font-weight-bold">Total Amount</span>
                            <span class="h5 font-weight-bold text-success" id="grandTotal">₹0</span>
                        </div>
                        <button onclick="window.location.href='checkout.html'" class="btn btn-warning btn-block btn-lg font-weight-bold py-3 mb-3 shadow-sm">PROCEED TO CHECKOUT</button>
                        <a href="products.html" class="btn btn-outline-dark btn-block">Continue Shopping</a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <footer class="text-center py-5 bg-dark text-white">
        <div class="container">
            <h4 class="font-weight-bold text-warning mb-3">EliteCart</h4>
            <p class="text-muted small">© 2026 EliteCart | Curating Excellence for the Modern Lifestyle</p>
        </div>
    </footer>

    

    <script>
        function loadCart() {
            // UPDATED KEY: Now matches 'EliteCartData' from product-view.html
            const cartItems = JSON.parse(localStorage.getItem('EliteCartData')) || [];
            const container = document.getElementById('cartContent');
            let total = 0;

            if (cartItems.length === 0) {
                container.innerHTML = `
                    <div class="text-center py-5">
                        <i class="fas fa-shopping-basket empty-cart-icon"></i>
                        <h4>Your cart is empty!</h4>
                        <p class="text-muted">Looks like you haven't added anything yet.</p>
                        <a href="products.html" class="btn btn-warning mt-2">Go to Shop</a>
                    </div>`;
                updateSummary(0);
                return;
            }

            let html = '';
            cartItems.forEach((item, index) => {
                // Since we now store price as a pure number in product-view, 
                // we check if it's already a number or needs cleaning.
                const price = typeof item.price === 'number' ? item.price : parseInt(item.price.replace(/[^\d]/g, ''));
                
                const itemSubtotal = price * item.qty;
                total += itemSubtotal;

                html += `
                <div class="row mb-4 align-items-center border-bottom pb-4">
                    <div class="col-md-2 col-4">
                        <img src="${item.img}" class="cart-item-img shadow-sm" alt="${item.name}">
                    </div>
                    <div class="col-md-6 col-8">
                        <h6 class="font-weight-bold mb-1">${item.name}</h6>
                        <p class="text-muted small mb-0">Category: Elite Selection</p>
                        <p class="text-success font-weight-bold mb-0">₹${price.toLocaleString('en-IN')}</p>
                    </div>
                    <div class="col-md-2 col-6 text-center">
                        <div class="font-weight-bold">Qty: ${item.qty}</div>
                    </div>
                    <div class="col-md-2 col-6 text-right">
                        <button class="btn btn-outline-danger btn-sm rounded-circle" onclick="removeItem(${index})">
                            <i class="fas fa-trash-alt"></i>
                        </button>
                    </div>
                </div>`;
            });

            container.innerHTML = html;
            updateSummary(total);
        }

        function updateSummary(total) {
            const formattedTotal = '₹' + total.toLocaleString('en-IN');
            document.getElementById('subtotalPrice').innerText = formattedTotal;
            document.getElementById('grandTotal').innerText = formattedTotal;
        }

        function removeItem(index) {
            // UPDATED KEY: Must match 'EliteCartData'
            let cartItems = JSON.parse(localStorage.getItem('EliteCartData')) || [];
            cartItems.splice(index, 1);
            localStorage.setItem('EliteCartData', JSON.stringify(cartItems));
            loadCart();
        }

        // Initialize cart on load
        document.addEventListener('DOMContentLoaded', loadCart);
    </script>

    <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.5.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
